<style>
  /* 强制所有 gallery 里的图片变成正规的方块网格 */
  .gallery img {
    height: 250px !important;      /* 你可以随时来这里修改高度 */
    width: 100% !important;
    object-fit: cover !important;  /* 裁切填满 */
    border-radius: 6px !important;
  }
  
  /* 强制图片的超链接外壳也撑满格子，防止高度塌陷 */
  .gallery a {
    display: block !important;
    width: 100% !important;
    height: 100% !important;
  }
</style>
